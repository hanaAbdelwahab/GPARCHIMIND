<style>
:root {
  --stroke: #374151; /* Darker charcoal stroke to match image */
  --accent: #10b981;
  --scribble: #6366f1; /* Precise purple from reference */
  --bg: #f8fafc;
}

body {
  margin: 0;
  height: 100vh;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Space Grotesk', sans-serif;
  color: #1f2937;
}

/* ================= ANIMATIONS ================= */

@keyframes jitter {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

@keyframes legSwing {
  0%,100% { transform: rotate(-6deg); }
  50% { transform: rotate(6deg); }
}

@keyframes paperFlow {
  0% { left: 5%; opacity: 0; transform: scale(0.5); }
  20%,80% { opacity: 1; transform: scale(1); }
  100% { left: 90%; opacity: 0; transform: scale(0.5); }
}

/* ================= LOADER ================= */

.arch-loader {
  position: relative;
  width: 800px;
  height: 300px;
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
}

/* ================= CHARACTER ================= */

.file-character {
  position: relative;
  width: 90px;
  height: 120px;
  background: #fff;
  border: 4px solid var(--stroke);
  border-radius: 6px;
  /* Soft grey shadow from the reference image */
  filter: drop-shadow(6px 6px 0px #f1f5f9); 
  animation: jitter 0.5s infinite ease-in-out;
}

/* Corrected Pattern: ~ n ~ n ~ n ~ */
.file-character::before {
  content: '~ ~ ~ ~ ~ ~';
  position: absolute;
  top: 42px;
  width: 100%;
  text-align: center;
  font-family: 'JetBrains Mono', monospace; /* Monospace for alignment */
  font-size: 14px;
  font-weight: 500;
  color: var(--scribble);
  letter-spacing: -1px;
}

/* Arms */
.arm-l,
.arm-r {
  position: absolute;
  width: 30px;
  height: 40px;
  border: 4px solid var(--stroke);
  top: 35px;
}

.arm-l {
  left: -26px;
  border-right: none;
  border-top: none;
  border-radius: 0 0 0 30px;
}

.arm-r {
  right: -26px;
  border-left: none;
  border-top: none;
  border-radius: 0 0 30px 0;
}

/* ================= L LEGS (MOVING) ================= */

.leg-l,
.leg-r {
  position: absolute;
  width: 16px;
  height: 30px;
  border-left: 4px solid var(--stroke);
  border-bottom: 4px solid var(--stroke);
  bottom: -34px;
  transform-origin: top;
  animation: legSwing 0.4s infinite ease-in-out;
}

.leg-l {
  left: 26px;
}

.leg-r {
  right: 26px;
  animation-delay: 0.2s;
}

/* ================= MOVING REQUEST ================= */

.moving-request {
  position: absolute;
  width: 26px;
  height: 36px;
  background: #fff;
  border: 2px solid var(--accent);
  top: 48%;
  font-size: 9px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: paperFlow 3s infinite linear;
}

/* ================= LABEL ================= */

.label-tag {
  position: absolute;
  bottom: -80px;
  width: 100%;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
  color: #064e3b;
  text-transform: uppercase;
}
</style>
</head>

<body>

<div class="arch-loader">

  <div class="moving-request">REQ</div>

  <div class="file-character">
    <div class="arm-l"></div>
    <div class="arm-r"></div>
    <div class="leg-l"></div>
    <div class="leg-r"></div>
    <div class="label-tag">Presentation</div>
  </div>

  <div class="file-character">
    <div class="arm-l"></div>
    <div class="arm-r"></div>
    <div class="leg-l"></div>
    <div class="leg-r"></div>
    <div class="label-tag">Business</div>
  </div>

  <div class="file-character">
    <div class="arm-l"></div>
    <div class="arm-r"></div>
    <div class="leg-l"></div>
    <div class="leg-r"></div>
    <div class="label-tag">Data Layer</div>
  </div>

</div>
