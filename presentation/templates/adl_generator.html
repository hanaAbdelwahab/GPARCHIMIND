<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ArchiMind - Generate ADL</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/Dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

<header class="blueprint-header">
  <div class="container d-flex justify-content-between align-items-center">

    <div class="brand">
      <img src="/static/images/Logo_b&w.png"
           style="height: 60px; width: 140px;">
    </div>

    <button
      class="btn btn-outline-light rounded-circle"
      style="width:40px;height:40px;"
      onclick="window.location.href='/adl-dashboard'"
    >
      <i class="bi bi-arrow-left"></i>
    </button>

  </div>
</header>

<div class="container py-5">

  <div class="row justify-content-center">

    <div class="col-lg-8">

      <div class="studio-card p-5 animate-pop">

        <h2 class="fw-bold text-center mb-3">
          ADL Generation
        </h2>

        <p class="text-muted text-center mb-4">
          Generate architecture directly from SRS without full pipeline
        </p>

        <!-- FILE -->
        <input
          type="file"
          id="adlFileInput"
          class="form-control mb-3"
          accept=".pdf"
          onchange="checkADLInputs()"
        >

        <!-- ARCHITECTURE -->
        <select
          id="adlArchitecture"
          class="form-select mb-4"
          onchange="checkADLInputs()"
        >
          <option value="">Select Architecture Style</option>

          <option value="Microservices">
            Microservices
          </option>

          <option value="Layered">
            Layered
          </option>

          <option value="Monolithic">
            Monolithic
          </option>

          <option value="Event-Driven">
            Event-Driven
          </option>

        </select>

        <!-- BUTTON -->
        <button
          class="create-btn w-100"
          id="generateAdlBtn"
          onclick="generateStandaloneADL()"
          disabled
        >
          Generate ADL
        </button>

      </div>

    </div>

  </div>

</div>

<script src="/static/js/adl_dashboard.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
