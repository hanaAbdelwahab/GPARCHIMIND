<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ArchiMind - Generate ADL</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/Dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body>

<header class="blueprint-header">
  <div class="container d-flex justify-content-between align-items-center">

    <div class="brand">
      <img src="/static/images/Logo_b&w.png"
           style="height: 60px; width: 140px;">
    </div>

    <button
      class="btn btn-outline-light rounded-circle"
      style="width:40px;height:40px;"
      onclick="window.location.href='/adl-dashboard'"
    >
      <i class="bi bi-arrow-left"></i>
    </button>

  </div>
</header>

<div class="container py-5">

  <div class="row justify-content-center">

    <div class="col-lg-8">

      <div class="studio-card p-5 animate-pop">

        <h2 class="fw-bold text-center mb-3">
          ADL Generation
        </h2>

        <p class="text-muted text-center mb-4">
          Generate architecture directly from SRS without full pipeline
        </p>

        <!-- FILE -->
        <input
          type="file"
          id="adlFileInput"
          class="form-control mb-3"
          accept=".pdf"
          onchange="checkADLInputs()"
        >

        <!-- ARCHITECTURE -->
        <select
          id="adlArchitecture"
          class="form-select mb-4"
          onchange="checkADLInputs()"
        >
          <option value="">Select Architecture Style</option>

         <option value="Monolithic">
    Monolithic
  </option>

  <option value="Layered">
    Layered
  </option>

  <option value="Client-Server">
    Client-Server
  </option>

  <option value="Microservices">
    Microservices
  </option>

  <option value="Service-Oriented Architecture">
    Service-Oriented Architecture
  </option>

  <option value="Event-Driven">
    Event-Driven
  </option>

  <option value="Microkernel">
    Microkernel
  </option>

  <option value="Component-Based">
    Component-Based
  </option>

  <option value="Pipe-and-Filter">
    Pipe-and-Filter
  </option>

  <option value="Broker">
    Broker
  </option>

  <option value="Peer-to-Peer">
    Peer-to-Peer
  </option>

  <option value="Blackboard">
    Blackboard
  </option>

  <option value="MVC">
    MVC
  </option>

  <option value="Space-Based">
    Space-Based
  </option>

  <option value="REST">
    REST
  </option>

  <option value="Hexagonal">
    Hexagonal
  </option>

  <option value="Serverless">
    Serverless
  </option>

  <option value="Event-Bus">
    Event-Bus
  </option>

        </select>

        <!-- BUTTON -->
        <button
          class="create-btn w-100"
          id="generateAdlBtn"
          onclick="generateStandaloneADL()"
          disabled
        >
          Generate ADL
        </button>

      </div>

    </div>

  </div>

</div>

<script src="/static/js/adl_generator.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- PDF VIEWER MODAL -->
<div
  class="modal fade"
  id="pdfModal"
  tabindex="-1"
  aria-hidden="true"
>
  <div class="modal-dialog modal-xl modal-dialog-centered">

    <div
      class="modal-content"
      style="
        height: 95vh;
        border-radius: 20px;
        overflow: hidden;
      "
    >

      <!-- HEADER -->
      <div
        class="d-flex justify-content-between align-items-center px-4 py-3"
        style="
          background: #0f7b5f;
          color: white;
        "
      >

        <h4 class="m-0 fw-bold">
          ADL ARCHITECTURE BLUEPRINT
        </h4>

        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
        ></button>

      </div>

      <!-- PDF -->
      <div style="flex:1; height:100%;">

        <iframe
          id="pdfViewer"
          width="100%"
          height="100%"
          style="border:none;"
        ></iframe>

      </div>

    </div>

  </div>
</div>


</body>
</html>
